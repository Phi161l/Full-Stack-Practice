<!DOCTYPE html>
<html>
<head>
  <title>Catch the Dollar!</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      background: #222;
      overflow: hidden;
      font-family: sans-serif;
      user-select: none;
      cursor: default;
    }

    #square {
      width: 70px;
      height: 70px;
      background: red;
      color: white;
      font-size: 36px;
      font-weight: bold;
      display: flex;
      justify-content: center;
      align-items: center;
      position: absolute;
      cursor: pointer;
      border-radius: 8px;
      transition: all 0.2s;
    }

    #score {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 48px;
      font-weight: bold;
      color: white;
      text-align: center;
      background: rgba(0,0,0,0.5);
      padding: 6px 12px;
      border-radius: 8px;
    }

    #instruction {
      position: fixed;
      top: 20px;
      left: 20px;
      font-size: 20px;
      font-weight: normal;
      color: #fff;
      background: rgba(0,0,0,0.3);
      padding: 4px 8px;
      border-radius: 6px;
    }

    .popup {
      position: absolute;
      color: yellow;
      font-weight: bold;
      font-size: 36px;
      pointer-events: none;
      text-shadow: 2px 2px 4px #000;
      animation: pop 0.7s forwards;
    }

    @keyframes pop {
      0% { transform: translateY(0); opacity: 1; }
      100% { transform: translateY(-60px) scale(1.3); opacity: 0; }
    }
  </style>
</head>
<body>

<div id="score">$20</div>
<div id="instruction"> Catch it and score! </div>
<div id="square">$</div>

<script>
  const square = document.getElementById("square");
  const scoreDisplay = document.getElementById("score");
  
  // Start the score at 17
  let score = 17;
  
  let speed = 1000; 
  let interval;

  function moveSquare() {
    const x = Math.random() * (window.innerWidth - 70);
    const y = Math.random() * (window.innerHeight - 70);
    square.style.left = x + "px";
    square.style.top = y + "px";
  }

  function showPopup(x, y) {
    const popup = document.createElement("div");
    popup.className = "popup";
    popup.textContent = "+$1";
    popup.style.left = x + "px";
    popup.style.top = y + "px";
    document.body.appendChild(popup);
    setTimeout(() => document.body.removeChild(popup), 700);
  }

  function startGame() {
    clearInterval(interval);
    interval = setInterval(moveSquare, speed);
    moveSquare();
  }

  square.addEventListener("click", (e) => {
    e.stopPropagation();
    score++;
    scoreDisplay.textContent = "$" + score; 
    showPopup(e.pageX, e.pageY);
    speed = Math.max(150, speed - 70);
    startGame();
  });

  document.body.addEventListener("click", () => {
    startGame();
  });

  // Initialize display
  scoreDisplay.textContent = "$" + score;
  startGame();
</script>

</body>
</html>
